<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        input, button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Test de Login</h2>
    <input type="text" id="username" value="admin" placeholder="Usuario">
    <input type="password" id="password" value="admin123" placeholder="Contraseña">
    <button onclick="testLogin()">Probar Login</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.textContent = 'Intentando login...';
            resultDiv.className = '';
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <strong>✅ LOGIN EXITOSO!</strong><br>
                        Usuario: ${data.user.username}<br>
                        Rol: ${data.user.rol}<br>
                        Token: ${data.access_token.substring(0, 20)}...
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = `❌ Error: ${data.error || 'Error desconocido'}`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <strong>❌ ERROR DE CONEXIÓN</strong><br>
                    ${error.message}<br><br>
                    <small>Verifica que el backend esté corriendo en puerto 3000</small>
                `;
            }
        }
    </script>
</body>
</html>
