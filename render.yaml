services:
  - type: web
    name: modulo-de-compras
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python -c "import sys; sys.path.insert(0, '.'); from database.db import init_database; init_database()"
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      # Persistencia de datos con PostgreSQL (recomendado).
      # Pegá acá la connection string de tu base (Supabase / Neon / Render Postgres).
      # Mientras DATABASE_URL no esté seteada, la app usa SQLite (efímero en Render).
      - key: DATABASE_URL
        sync: false
