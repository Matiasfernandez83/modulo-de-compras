services:
  - type: web
    name: modulo-de-compras
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python -c "import sys; sys.path.insert(0, '.'); from database.db import init_database; init_database()"
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
    # IMPORTANTE: el filesystem de Render es efímero — sin disco persistente,
    # la base SQLite se borra en cada deploy/reinicio y se pierden los datos.
    # Para persistir: descomentar el bloque disk (requiere plan pago) y la
    # variable DATABASE_PATH. Alternativa recomendada a largo plazo: migrar
    # a PostgreSQL gestionado (Render Postgres, Supabase o Neon).
    #   - key: DATABASE_PATH
    #     value: /var/data/gestion_compras.db
    # disk:
    #   name: datos-sqlite
    #   mountPath: /var/data
    #   sizeGB: 1
