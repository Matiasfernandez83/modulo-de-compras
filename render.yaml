services:
  - type: web
    name: modulo-de-compras
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python database/db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "True"
